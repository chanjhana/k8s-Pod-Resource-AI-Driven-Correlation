apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgemind-agents
  namespace: monitoring
  labels:
    app: edgemind-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edgemind-agents
  template:
    metadata:
      labels:
        app: edgemind-agents
    spec:
      serviceAccountName: edgemind-sa
      terminationGracePeriodSeconds: 30
      containers:
        - name: edgemind-agents
          image: edgemind/agents:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
              name: health
          env:
            - name: REDIS_URL
              value: "redis://redis-svc.monitoring.svc.cluster.local:6379"
            - name: PROMETHEUS_URL
              value: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
