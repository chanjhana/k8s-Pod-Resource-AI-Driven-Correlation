[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = module
# Tests must share the SAME loop scope as the module-scoped server/client
# fixtures. With the default (function) scope, the OPC-UA server bound on the
# module loop is not serviced during per-function-loop tests, so client
# requests connect but time out. Keep these two in lockstep.
asyncio_default_test_loop_scope = module
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
